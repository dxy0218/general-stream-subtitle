name: Release v0.4.0

on:
  push:
    paths:
      - '.github/workflows/release-v040.yml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct and validate
        shell: bash
        run: |
          cat .release/project.b64.part* | base64 --decode > /tmp/gss-v040.zip
          rm -rf /tmp/gss-project
          mkdir -p /tmp/gss-project
          unzip -q /tmp/gss-v040.zip -d /tmp/gss-project
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/gss-project/. .
          npm run check
      - name: Commit release
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release General Stream Subtitle v0.4.0"
          git push
# retrigger after archive completion
