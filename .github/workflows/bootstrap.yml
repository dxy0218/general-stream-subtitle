name: Bootstrap v0.2.0

on:
  push:
    paths:
      - '.bootstrap/project.b64.part*'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct project
        shell: bash
        run: |
          cat .bootstrap/project.b64.part* | base64 --decode > /tmp/general-stream-subtitle.zip
          unzip -o /tmp/general-stream-subtitle.zip -d .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml
      - name: Commit project
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release General Stream Subtitle v0.2.0" || exit 0
          git push
